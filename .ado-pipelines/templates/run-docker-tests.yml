parameters:
  - name: capability
    type: string
    displayName: Requested agent capability
  - name: docker_image
    type: string
    default: 'python:3.12-slim'
    displayName: Docker image used when no test Dockerfile is provided
  - name: test_dockerfile
    type: string
    default: ''
    displayName: Optional Dockerfile path for the test runner image relative to the repo root
  - name: test_build_context
    type: string
    default: '.'
    displayName: Docker build context for the optional test runner image
  - name: test_build_args
    type: object
    default: {}
    displayName: Docker build arguments for the optional test runner image
  - name: uv_sync_args
    type: string
    default: '--group dev'
    displayName: Additional arguments passed to uv sync
  - name: coverage_source
    type: string
    default: 'src'
    displayName: Source path used for coverage collection
  - name: pytest_mark_expression
    type: string
    default: 'unit or integration'
    displayName: Pytest marker expression
  - name: env_variables
    type: object
    default: {}
    displayName: Additional environment variables passed to the container

jobs:
  - job: RunDockerTests
    displayName: Run Docker Tests
    pool:
      name: ${{ parameters.capability }}
    steps:
      - checkout: self
        clean: true

      - script: |
          set -euo pipefail

          PROJECT_DIR="$(Build.SourcesDirectory)"
          REPORT_DIR="$(Agent.TempDirectory)/pytest_reports/docker-tests"
          RUNNER_IMAGE="${{ parameters.docker_image }}"
          TEST_RUNNER_IMAGE=""

          rm -rf "$REPORT_DIR"
          mkdir -p "$REPORT_DIR"

          BUILD_DOCKER_ARGS=()
          while IFS='=' read -r env_var value; do
            arg_key="${env_var#DOCKER_TEST_BUILD_ARG_}"
            BUILD_DOCKER_ARGS+=(--build-arg "${arg_key}=${value}")
          done < <(env | awk -F= '/^DOCKER_TEST_BUILD_ARG_/ { print $0 }' | sort)

          if [ -n "${{ parameters.test_dockerfile }}" ]; then
            TEST_RUNNER_IMAGE="docker-test-runner-$(Build.BuildId)"
            TEST_DOCKERFILE="$(Build.SourcesDirectory)/${{ parameters.test_dockerfile }}"
            TEST_BUILD_CONTEXT="$(Build.SourcesDirectory)/${{ parameters.test_build_context }}"

            docker build \
              -f "$TEST_DOCKERFILE" \
              "${BUILD_DOCKER_ARGS[@]}" \
              -t "$TEST_RUNNER_IMAGE" \
              "$TEST_BUILD_CONTEXT"

            RUNNER_IMAGE="$TEST_RUNNER_IMAGE"
          fi

          cleanup() {
            if [ -n "$TEST_RUNNER_IMAGE" ]; then
              docker image rm -f "$TEST_RUNNER_IMAGE" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          DOCKER_ENV_ARGS=()
          while IFS='=' read -r env_var value; do
            arg_key="${env_var#DOCKER_TEST_ENV_}"
            DOCKER_ENV_ARGS+=("-e" "${arg_key}=${value}")
          done < <(env | awk -F= '/^DOCKER_TEST_ENV_/ { print $0 }' | sort)

          docker run --rm \
            -v "$PROJECT_DIR:/workspace:ro" \
            -v "$REPORT_DIR:/test-results" \
            -w /workspace \
            -e PYTHONPATH="/workspace:/workspace/src" \
            -e PYTHONDONTWRITEBYTECODE=1 \
            -e COVERAGE_FILE=/test-results/.coverage \
            -e RUFF_CACHE_DIR=/tmp/ruff-cache \
            -e MYPY_CACHE_DIR=/tmp/mypy-cache \
            -e UV_PROJECT_ENVIRONMENT=/tmp/uv-env \
            -e UV_CACHE_DIR=/tmp/uv-cache \
            -e UV_PYTHON_DOWNLOADS=never \
            -e TEST_REPORT_DIR=/test-results \
            -e PYTEST_MARK_EXPRESSION="${{ parameters.pytest_mark_expression }}" \
            "${DOCKER_ENV_ARGS[@]}" \
            "$RUNNER_IMAGE" \
            /bin/bash -lc '
              set -euo pipefail
              mkdir -p /tmp/pytest-cache /tmp/ruff-cache /tmp/mypy-cache /tmp/uv-cache /tmp/uv-env
              if ! command -v uv >/dev/null 2>&1; then
                if command -v apt-get >/dev/null 2>&1; then
                  apt-get update
                  apt-get install -y --no-install-recommends curl ca-certificates
                  rm -rf /var/lib/apt/lists/*
                fi
                curl -LsSf https://astral.sh/uv/install.sh | sh
              fi

              export PATH="$HOME/.local/bin:$PATH"

              uv sync --frozen ${{ parameters.uv_sync_args }}
              uv run --frozen ruff check
              uv run --frozen mypy --cache-dir /tmp/mypy-cache
              uv run --frozen pytest \
                -m "${PYTEST_MARK_EXPRESSION}" \
                -p no:cacheprovider \
                --junitxml=/test-results/junit.xml \
                --cov=${{ parameters.coverage_source }} \
                --cov-report=xml:/test-results/coverage.xml \
                --cov-report=term-missing \
                -v
            '
        displayName: Execute test suite in Docker
        env:
          ${{ each arg in parameters.test_build_args }}:
            DOCKER_TEST_BUILD_ARG_${{ arg.key }}: ${{ arg.value }}
          ${{ each var in parameters.env_variables }}:
            DOCKER_TEST_ENV_${{ var.key }}: ${{ var.value }}

      - task: PublishTestResults@2
        displayName: Publish Test Results
        condition: always()
        inputs:
          testResultsFormat: JUnit
          testResultsFiles: '$(Agent.TempDirectory)/pytest_reports/docker-tests/junit.xml'
          failTaskOnFailedTests: true
          testRunTitle: 'Run Docker Tests'

      - task: PublishCodeCoverageResults@2
        displayName: Publish Code Coverage
        condition: always()
        inputs:
          summaryFileLocation: '$(Agent.TempDirectory)/pytest_reports/docker-tests/coverage.xml'
          pathToSources: '$(Build.SourcesDirectory)/src'
