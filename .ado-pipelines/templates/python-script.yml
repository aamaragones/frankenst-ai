parameters:
  - name: capability
    type: string
    displayName: Requested agent capability
  - name: uv_sync_args
    type: string
    default: '--group dev'
    displayName: 'Additional arguments passed to uv sync'
  - name: script_path
    type: string
    default: 'scripts/myscript.py'
    displayName: 'Path to the Python script to execute'
  - name: script_args
    type: string
    default: ''
    displayName: 'Arguments passed to the Python script'
  - name: env_variables
    type: object
    default: {}
    displayName: 'Environment variables passed to the script'
  - name: service_connection
    type: string
    default: ''
    displayName: 'Azure service connection (optional, for authentication)'

jobs:
  - job: RunPythonScript
    displayName: 'Run Python Script'
    pool:
      name: ${{ parameters.capability }}
    steps:
    - checkout: self
 
    - task: UsePythonVersion@0
      displayName: 'Select Python version'
      inputs:
        versionSpec: '3.12'
        addToPath: true
 
    - script: |
        set -euo pipefail
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$HOME/.local/bin:$PATH"

        echo "Syncing environment with uv..."
        uv sync --frozen ${{ parameters.uv_sync_args }}
      displayName: 'Sync Python dependencies with uv'
 
    - ${{ if ne(parameters.service_connection, '') }}:
      - task: AzureCLI@2
        displayName: 'Execute Python script with service connection'
        inputs:
          azureSubscription: ${{ parameters.service_connection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -euo pipefail
            export PATH="$HOME/.local/bin:$PATH"

            echo "Running Python script: ${{ parameters.script_path }}"
            uv run python "${{ parameters.script_path }}" ${{ parameters.script_args }}
        env:
          ${{ each var in parameters.env_variables }}:
            ${{ var.key }}: ${{ var.value }}

    - ${{ if eq(parameters.service_connection, '') }}:
      - script: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          echo "Running Python script: ${{ parameters.script_path }}"
          uv run python "${{ parameters.script_path }}" ${{ parameters.script_args }}
        displayName: 'Execute Python script'
        env:
          ${{ each var in parameters.env_variables }}:
            ${{ var.key }}: ${{ var.value }}